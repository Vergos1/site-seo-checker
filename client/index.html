  <body>
    <main id="main">
      <section class="content-section">
        <div class="hero-content">
          <h1>Free Website Link Checker</h1>
          <div class="hero-description">
            <p>Check your website's links and find out how it's performing.</p>
            <p>Select the type of check — indexation or semantics.</p>
            <p>Enter your website URL and run the check.</p>
          </div>
        </div>
        <form
          id="link-checker-form"
          class="link-checker-form"
          autocomplete="off"
        >
          <div class="radio-group">
            <p>Select the type of check:</p>
            <label
              class="radio-item"
              for="indexation"
            >
              <input
                type="radio"
                id="indexation"
                name="check-type"
                value="indexation"
                checked
              />
              Indexation
            </label>
            <label
              for="semantics"
              class="radio-item"
            >
              <input
                type="radio"
                id="semantics"
                name="check-type"
                value="semantics"
              />
              Semantics
            </label>
          </div>
          <div class="input-group">
            <span
              class="input-group-icon"
              aria-hidden="true"
            >
              <img
                id="siteFavicon"
                class="site-favicon"
                alt="site favicon"
                src="./assets/icons/internet.svg"
                width="24"
                height="24"
                loading="lazy"
              />
            </span>

            <input
              class="form-control"
              id="check-input"
              name="url"
              type="text"
              placeholder="Enter your website URL"
            />

            <button
              class="btn pri-xl-btn"
              type="submit"
              disabled
              id="check-button"
            >
              Check link
            </button>
          </div>
        </form>

        <span class="promt-block">
          <img
            src="./assets/icons/warn.svg"
            alt="warning"
            width="18"
            height="18"
          />
          <p>Unfortunately, some websites may fail verification due to their security measures.</p>
        </span>
        <section
          id="result"
          class="result-section"
        ></section>
      </section>
    </main>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script
      type="module"
      defer
      src="./scripts/main.js"
    ></script>
